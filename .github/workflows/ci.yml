name: CI/CD Pipeline

on:
  push:
    branches: ['**']
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -ExcludeRule PSAvoidUsingWriteHost
          $results | Format-Table -AutoSize
          if ($results | Where-Object { $_.Severity -eq 'Error' }) {
            throw "PSScriptAnalyzer found errors"
          }

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults.xml
          if-no-files-found: warn

  release:
    name: Publish and Release
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Module Info
        id: module_info
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile -Path ./InTUI.psd1
          "version=$($manifest.ModuleVersion)" >> $env:GITHUB_OUTPUT
          "release_notes<<EOF" >> $env:GITHUB_OUTPUT
          if ($manifest.PrivateData.PSData.ReleaseNotes) {
            $manifest.PrivateData.PSData.ReleaseNotes >> $env:GITHUB_OUTPUT
          } else {
            "See commits for changes." >> $env:GITHUB_OUTPUT
          }
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Validate Tag Matches Module Version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile -Path ./InTUI.psd1
          $moduleVersion = $manifest.ModuleVersion
          $tagVersion = '${{ github.ref_name }}' -replace '^v', ''
          if ($moduleVersion -ne $tagVersion) {
            throw "Tag version ($tagVersion) does not match module version ($moduleVersion). Please update the module manifest."
          }
          Write-Host "Version validated: $moduleVersion"

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw "PSGALLERY_API_KEY secret is not set"
          }
          Publish-Module -Path . -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Force

      - name: Create Release Archive
        shell: pwsh
        run: |
          $version = '${{ steps.module_info.outputs.version }}'
          $zipName = "InTUI-v$version.zip"
          $filesToInclude = @(
            'InTUI.psd1',
            'InTUI.psm1',
            'Public',
            'Private',
            'Views',
            'CommandMappings.ps1',
            'Start-InTUI.ps1'
          )
          Compress-Archive -Path $filesToInclude -DestinationPath "./$zipName" -Force
          Write-Host "Created release archive: $zipName"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          name: v${{ steps.module_info.outputs.version }}
          body: |
            ## InTUI v${{ steps.module_info.outputs.version }}

            ### Installation

            ```powershell
            Install-Module -Name InTUI -Scope CurrentUser
            ```

            ### Release Notes

            ${{ steps.module_info.outputs.release_notes }}
          draft: false
          prerelease: false
          files: InTUI-v${{ steps.module_info.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
